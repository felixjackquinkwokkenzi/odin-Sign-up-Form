<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tokofelix — Get started</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="left-panel">
        <div class="brand-panel__pattern" aria-hidden="true"></div>

        <div class="logo">Tokofelix<span class="logo-tm">™</span></div>

        <div class="illustration" aria-hidden="true">

            viewBox="0 0 100 130"

              width="96"

              fill="#ffffff"
              opacity="0.55"
            />
            <line
              x1="50"
              y1="2"
              x2="50"
              y2="128"
              stroke="#0f2a1c"
              stroke-opacity="0.15"
              stroke-width="2"
            />
            <line
              x1="2"
              y1="65"
              x2="98"
              y2="65"
              stroke="#0f2a1c"
              stroke-opacity="0.15"
              stroke-width="2"
            />
          </svg>

          <svg
            class="illustration__window illustration__window--right"
            viewBox="0 0 100 130"
          >
            <rect
              x="2"
              y="2"
              width="96"
              height="126"
              rx="4"
              fill="#ffffff"
              opacity="0.55"
            />
            <line
              x1="50"
              y1="2"
              x2="50"
              y2="128"
              stroke="#0f2a1c"
              stroke-opacity="0.15"
              stroke-width="2"
            />
            <line
              x1="2"
              y1="65"
              x2="98"
              y2="65"
              stroke="#0f2a1c"
              stroke-opacity="0.15"
              stroke-width="2"
            />
          </svg>

          <svg class="illustration__phone" viewBox="0 0 260 460">
            <rect x="4" y="4" width="252" height="452" rx="34" fill="#0f2a1c" />
            <rect
              x="16"
              y="34"
              width="228"
              height="392"
              rx="6"
              fill="#ffffff"
            />
            <rect x="100" y="16" width="60" height="10" rx="5" fill="#0f2a1c" />
            <text
              x="130"
              y="66"
              text-anchor="middle"
              font-family="Manrope, sans-serif"
              font-size="11"
              letter-spacing="2"
              fill="#9CA3AF"
            >
              SIGN UP
            </text>

            <circle cx="130" cy="112" r="34" fill="#2ECC71" />
            <circle cx="130" cy="102" r="12" fill="#ffffff" />
            <path d="M108 132 q22 -20 44 0" fill="#ffffff" />

            <text
              x="40"
              y="168"
              font-family="Manrope, sans-serif"
              font-size="10"
              fill="#6B7280"
            >
              Username
            </text>
            <rect
              x="38"
              y="176"
              width="184"
              height="26"
              rx="6"
              fill="#F3F4F6"
            />

            <text
              x="40"
              y="222"
              font-family="Manrope, sans-serif"
              font-size="10"
              fill="#6B7280"
            >
              Email
            </text>
            <rect
              x="38"
              y="230"
              width="184"
              height="26"
              rx="6"
              fill="#F3F4F6"
            />

            <text
              x="40"
              y="276"
              font-family="Manrope, sans-serif"
              font-size="10"
              fill="#6B7280"
            >
              Password
            </text>
            <rect
              x="38"
              y="284"
              width="184"
              height="26"
              rx="6"
              fill="#F3F4F6"
            />

            <rect
              x="38"
              y="326"
              width="12"
              height="12"
              rx="3"
              fill="none"
              stroke="#D1D5DB"
              stroke-width="1.5"
            />
            <text
              x="56"
              y="336"
              font-family="Manrope, sans-serif"
              font-size="8"
              fill="#9CA3AF"
            >
              I agree to all statements in terms of service
            </text>

            <rect
              x="38"
              y="352"
              width="184"
              height="34"
              rx="8"
              fill="#2ECC71"
            />
            <text
              x="130"
              y="373"
              text-anchor="middle"
              font-family="Manrope, sans-serif"
              font-weight="700"
              font-size="12"
              letter-spacing="1"
              fill="#ffffff"
            >
              SIGN UP
            </text>
          </svg>

          <svg class="illustration__person" viewBox="0 0 220 420">
            <ellipse
              cx="60"
              cy="405"
              rx="55"
              ry="10"
              fill="#0f2a1c"
              opacity="0.12"
            />
            <!-- legs -->
            <path d="M60 250 L40 400 L70 400 L82 260 Z" fill="#16283b" />
            <path d="M95 250 L110 395 L142 395 L118 250 Z" fill="#16283b" />
            <rect x="30" y="392" width="46" height="16" rx="8" fill="#2ECC71" />
            <rect
              x="104"
              y="388"
              width="46"
              height="16"
              rx="8"
              fill="#2ECC71"
            />
            <!-- torso -->
            <path
              d="M45 150 Q45 120 95 118 Q140 118 140 155 L150 255 Q95 275 40 255 Z"
              fill="#2ECC71"
            />
            <circle cx="60" cy="150" r="4" fill="#0f2a1c" opacity="0.5" />
            <circle cx="90" cy="170" r="4" fill="#0f2a1c" opacity="0.5" />
            <circle cx="115" cy="145" r="4" fill="#0f2a1c" opacity="0.5" />
            <circle cx="70" cy="200" r="4" fill="#0f2a1c" opacity="0.5" />
            <circle cx="120" cy="210" r="4" fill="#0f2a1c" opacity="0.5" />
            <!-- arm reaching -->
            <path
              d="M138 160 Q190 175 205 195"
              stroke="#F2B7A0"
              stroke-width="20"
              stroke-linecap="round"
              fill="none"
            />
            <circle cx="205" cy="196" r="12" fill="#F2B7A0" />
            <path
              d="M40 165 Q10 190 20 230"
              stroke="#ffffff"
              stroke-width="20"
              stroke-linecap="round"
              fill="none"
            />
            <circle cx="20" cy="232" r="12" fill="#F2B7A0" />
            <!-- head -->
            <circle cx="95" cy="90" r="38" fill="#F2B7A0" />
            <path
              d="M58 85 Q60 40 100 42 Q140 44 132 85 Q120 60 95 62 Q68 62 58 85Z"
              fill="#16283b"
            />
            <circle cx="82" cy="95" r="3" fill="#16283b" />
            <circle cx="110" cy="95" r="3" fill="#16283b" />
            <path
              d="M85 112 Q97 122 108 112"
              stroke="#16283b"
              stroke-width="3"
              fill="none"
              stroke-linecap="round"
            />
          </svg>

          <svg class="illustration__plant" viewBox="0 0 100 160">
            <path d="M20 150 L28 90 L40 150 Z" fill="#0f2a1c" opacity="0.2" />
            <rect x="15" y="110" width="45" height="45" rx="4" fill="#16283b" />
            <path d="M37 112 Q10 70 30 20 Q45 65 37 112Z" fill="#0f2a1c" />
            <path d="M37 112 Q60 60 85 30 Q60 75 37 112Z" fill="#12331f" />
            <path d="M37 112 Q20 60 45 15 Q55 60 37 112Z" fill="#1c4a2e" />
          </svg>
        </div>
        
        <p class="tagline">Sign up today to get exciting offers..!</p>
      </div>

      <div class="right-panel">
        <h1 class="heading">Get Started</h1>

        <form id="signup-form">
          <div class="field">
            <label for="firstName" class="signup-label">First Name</label>
            <input
              type="text"
              id="firstName"
              name="firstName"
              placeholder="e.g. Sarah"
            />
          </div>

          <div class="field">
            <label for="lastName" class="signup-label">Last Name</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="e.g. Connor"
            />
          </div>

          <div class="field">
            <label for="email" class="signup-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
            />
          </div>

          <div class="field">
            <label for="phone" class="signup-label">Phone</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="08xxxxxxxxxx"
            />
          </div>

          <div class="field">
            <label for="password" class="signup-label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
            />
          </div>

          <div class="field">
            <label for="confirmPassword" class="signup-label"
              >Confirm Password</label
            >
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="••••••••"
            />
          </div>

          <button type="submit" class="submit-btn">Create Account</button>

          <p class="login-hint">
            Already have an account..? <a href="#">Log in</a>
          </p>
        </form>
      </div>
    </main>
  </body>
</html>
